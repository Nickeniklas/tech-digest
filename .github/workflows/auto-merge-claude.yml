name: Auto-merge Claude branches

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  auto-merge:
    if: startsWith(github.ref_name, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and merge PR
        run: |
          gh pr create --title "Daily digest" --body "Auto-merge" --base main --head "${GITHUB_REF_NAME}" || echo "PR may already exist"
          gh pr merge --squash --delete-branch "${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}